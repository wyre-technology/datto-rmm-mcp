name: datto-rmm-mcp boots over stdio and lists tools
server:
  command: node
  args: [dist/index.js]
  env:
    MCP_TRANSPORT: "stdio"
    AUTH_MODE: "static"
    DATTO_API_KEY: ""
    DATTO_API_SECRET: ""
    DATTO_PLATFORM: ""
assert:
  list_tools:
    expect:
      contains_tools:
        - datto_list_devices
        - datto_list_alerts
        - datto_list_sites
timeout: 30s
