name: datto_list_sites returns is_error when credentials missing
server:
  command: node
  args: [dist/index.js]
  env:
    MCP_TRANSPORT: "stdio"
    AUTH_MODE: "static"
    DATTO_API_KEY: ""
    DATTO_API_SECRET: ""
    DATTO_PLATFORM: ""
assert:
  tool: datto_list_sites
  args: {}
  expect:
    is_error: true
timeout: 30s
